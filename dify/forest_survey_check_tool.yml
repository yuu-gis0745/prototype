        desc: has_errorの内容に応じて、error_log出力処理もしくはGIS用ファイル出力処理を行う。
        selected: false
        title: 条件分岐(error・gis出力)
        type: if-else
      height: 192
      id: '1780356676554'
      position:
        x: 1452.6361576200447
        y: -744.3656258984058
      positionAbsolute:
        x: 1452.6361576200447
        y: -744.3656258984058
