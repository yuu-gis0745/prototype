        prompt_template:
        - id: 08eddf29-063d-400a-bc64-4ed20d818666
          role: system
          text: '貴方は、森林調査の熟練技術者です。

            調査データである{{#1780355579484.body#}}を注意深く読み、既存ルールのファイルから特定した{{#1780371392037.error_log_md#}}以外の、数値の矛盾や入力ミスの可能性があるものを「追加エラー候補」として、指定されたJSON形式で出力してください。

            追加エラー候補がなければ、 [] を出力してください。'
        - id: a319ae93-b680-4a19-94df-1f4205bb8765
          role: user
          text: "## 調査データ\n{{#1780355579484.body#}}\n\n## 既に検出されたエラー\n{{#1780371392037.error_log_md#}}\n\
            \n## エラー候補がある可能性がある調査データ\n{{#1780371392037.survey_text_for_llm#}}\n\n\
            ## 作業手順\n以下の手順で、エラー候補を抽出してください。\n-  {{#1780371392037.survey_text_for_llm#}}を検査してください。\n\
            - 特に、以下の点について注意深く読んでください。\n　- 基本情報の対象樹種と、毎木情報の樹種の違いについては、調査を行った地区において妥当かどうか判断してください。\n\
            　- （樹高／（胸高直径＊100））で計算を行い、樹高に対して胸高直径が妥当かどうか判断してください。\n\n## JSON形式\n[\n\
            \  {\n    \"sheet_name\": \"シート名\",\n    \"row_no\": \"行番号または基本情報\",\n\
            \    \"rule_id\": \"R_LLM_001\",\n    \"category\": \"毎木または基本情報\",\n \
            \   \"check_item\": \"チェック内容の説明\",\n    \"target_column\": \"エラーのある項目名\"\
            ,\n    \"condition\": \"エラーと判断する条件\",\n    \"severity\": \"warning\",\n\
            \    \"message\": \"エラーの説明\",\n    \"fix_action\": \"修正方法\",\n    \"note\"\
            : \"\"\n  }\n]"
        selected: false
        structured_output_enabled: true
        title: LLM(追加エラー候補抽出)
