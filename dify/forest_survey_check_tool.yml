app:
  description: '森林調査データ入力・検査効率化のために、入力データのエラーの自動抽出、GISデータへの自動変換を行うためのアプリである。


    ・入力ファイルは、xlsx・PDF形式に対応

    ・FastAPI実施には、Renderを使用

    ・入力されたファイルに対して、既存のエラーチェックファイルにより検査、エラー抽出実施

    ・LLMを用いて、既存のエラールールにない新規のエラーの可能性があるものを抽出する

    ・エラーや追加エラー候補は、Slack投稿により通知

    ・エラーはlogをcsv形式で出力

    ・エラーがないときのみ、csv形式のGISデータを出力'
