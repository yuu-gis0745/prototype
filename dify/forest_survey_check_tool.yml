    - data:
        code: "import json\n\ndef main(existing_error_md: str, llm_error_json: str)\
          \ -> dict:\n    \n    if existing_error_md is None:\n        existing_error_md\
          \ = \"\"\n\n    if llm_error_json is None:\n        llm_error_json = \"\"\
          \n\n    try:\n        text = llm_error_json.strip()\n\n        # LLMが ```json\
          \ ... ``` の形で返した場合に備える\n        if text.startswith(\"```\"):\n         \
          \   text = text.replace(\"```json\", \"\")\n            text = text.replace(\"\
          ```\", \"\")\n            text = text.strip()\n\n        if text == \"\"\
          :\n            llm_errors = []\n        else:\n            llm_errors =\
          \ json.loads(text)\n\n        if isinstance(llm_errors, str):\n        \
          \    llm_errors = json.loads(llm_errors)\n\n        if not isinstance(llm_errors,\
          \ list):\n            llm_errors = []\n\n    except Exception:\n       \
          \ llm_errors = []\n\n    # 空の辞書や中身のない候補を除外する\n    cleaned_llm_errors = []\n\
          \n    for row in llm_errors:\n        if not isinstance(row, dict):\n  \
          \          continue\n\n        message = str(row.get(\"message\", \"\")\
          \ or row.get(\"error_message\", \"\")).strip()\n        rule_id = str(row.get(\"\
          rule_id\", \"\")).strip()\n        item_name = str(row.get(\"item_name\"\
          , \"\") or row.get(\"target_column\", \"\")).strip()\n\n        if not message\
          \ and not rule_id and not item_name:\n            continue\n\n        cleaned_llm_errors.append(row)\n\
          \n    llm_errors = cleaned_llm_errors\n    has_llm_error = len(llm_errors)\
          \ > 0\n\n    llm_error_md = \"\"\n\n    if has_llm_error:\n        headers\
          \ = [\n            \"sheet_name\",\n            \"row_no\",\n          \
          \  \"rule_id\",\n            \"category\",\n            \"item_name\",\n\
          \            \"check_item\",\n            \"severity\",\n            \"\
          error_message\",\n            \"fix_action\",\n        ]\n\n        llm_error_md\
          \ = \"| \" + \" | \".join(headers) + \" |\\n\"\n        llm_error_md +=\
          \ \"| \" + \" | \".join([\"---\"] * len(headers)) + \" |\\n\"\n\n      \
          \  for row in llm_errors:\n            values = [str(row.get(h, \"\")) for\
          \ h in headers]\n            llm_error_md += \"| \" + \" | \".join(values)\
          \ + \" |\\n\"\n\n    combined_error_md = existing_error_md\n\n    if llm_error_md:\n\
          \        combined_error_md += \"\\n\\n### LLMが検出した追加エラー\\n\"\n        combined_error_md\
          \ += llm_error_md\n\n    return {\n        \"combined_error_md\": combined_error_md,\n\
          \        \"llm_error_json\": json.dumps(llm_errors, ensure_ascii=False),\n\
          \        \"has_llm_error\": has_llm_error,\n    }"
        code_language: python3
        desc: 既存ルールのファイルから抽出したエラーと、抽出した追加エラー候補を結合する。
        outputs:
          combined_error_md:
            children: null
            type: string
          has_llm_error:
            children: null
            type: boolean
          llm_error_json:
            children: null
            type: string
        selected: false
        title: コード実行(既存エラー+追加エラー候補結合)
