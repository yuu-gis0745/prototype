          \        if s.lower().startswith(\"json\"):\n            s = s[4:].strip()\n\
          \n    try:\n        # JSON文字列をPythonのデータへ変換する\n        data = json.loads(s)\n\
          \n        return {\n            \"plots_json\": json.dumps(data, ensure_ascii=False),\n\
          \            \"parse_ok\": True,\n            \"error_message\": \"\"\n\
          \        }\n\n    except Exception as e:\n        # 読み込みに失敗した場合は、原因も出力する\n\
          \        return {\n            \"plots_json\": json.dumps({\"plots\": []},\
          \ ensure_ascii=False),\n            \"parse_ok\": False,\n            \"\
